<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Mobile Mulligans">
  <rect width="120" height="120" rx="26" fill="#1F3A3B"/>
  <g transform="translate(60 60) scale(0.84) translate(-60 -60)">
    <!-- Rings -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="#A78B63" stroke-width="2.2"/>
    <circle cx="60" cy="60" r="48.5" fill="none" stroke="#F4E8D5" stroke-width="0.75" opacity="0.3"/>

    <!-- Ground line + ball shadow -->
    <line x1="46" y1="86" x2="92" y2="86" stroke="#4C7B72" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="62" cy="86.3" rx="9" ry="1.7" fill="#4C7B72" opacity="0.35"/>

    <!-- M: left leg + middle V -->
    <polyline points="35,82 35,40 59,66 83,40" fill="none" stroke="#F4E8D5" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right leg = golf club -->
    <line x1="83" y1="40" x2="83" y2="70" stroke="#A78B63" stroke-width="7.5" stroke-linecap="round"/>
    <path d="M79 69 C82 68 85 69 87 72 L91 82 Q92 86 88 86 L76 86 Q73 86 74 83 Z" fill="#A78B63"/>

    <!-- Golf ball -->
    <circle cx="62" cy="79" r="7" fill="#F4E8D5" stroke="rgba(31,58,59,0.25)" stroke-width="0.6"/>
    <g fill="#1F3A3B" opacity="0.22">
      <circle cx="60" cy="77" r="0.8"/>
      <circle cx="63.6" cy="77" r="0.8"/>
      <circle cx="61.8" cy="80" r="0.8"/>
      <circle cx="64.9" cy="80" r="0.8"/>
      <circle cx="60" cy="81.4" r="0.8"/>
    </g>
  </g>
</svg>
