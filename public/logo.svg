<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 120 192" role="img" aria-label="Mobile Mulligans — Mobile Golf Simulator">
  <defs>
    <path id="mm-logo-arc" d="M16 60 A 44 44 0 0 0 104 60" fill="none"/>
  </defs>

  <!-- Badge -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#A78B63" stroke-width="2"/>
  <circle cx="60" cy="60" r="48.5" fill="none" stroke="#1F3A3B" stroke-width="0.75" opacity="0.3"/>

  <line x1="46" y1="86" x2="92" y2="86" stroke="#4C7B72" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <ellipse cx="62" cy="86.3" rx="9" ry="1.7" fill="#4C7B72" opacity="0.3"/>

  <!-- M: left leg + middle V -->
  <polyline points="35,82 35,40 59,66 83,40" fill="none" stroke="#1F3A3B" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right leg = golf club -->
  <line x1="83" y1="40" x2="83" y2="70" stroke="#A78B63" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M79 69 C82 68 85 69 87 72 L91 82 Q92 86 88 86 L76 86 Q73 86 74 83 Z" fill="#A78B63"/>

  <!-- Golf ball -->
  <circle cx="62" cy="79" r="7" fill="#F4E8D5" stroke="rgba(31,58,59,0.2)" stroke-width="0.6"/>
  <g fill="#1F3A3B" opacity="0.2">
    <circle cx="60" cy="77" r="0.8"/>
    <circle cx="63.6" cy="77" r="0.8"/>
    <circle cx="61.8" cy="80" r="0.8"/>
    <circle cx="64.9" cy="80" r="0.8"/>
    <circle cx="60" cy="81.4" r="0.8"/>
  </g>

  <!-- Curved web address -->
  <text fill="#1F3A3B" font-size="7" font-family="Arial, Helvetica, sans-serif" font-weight="600" letter-spacing="1.4">
    <textPath href="#mm-logo-arc" xlink:href="#mm-logo-arc" startOffset="50%" text-anchor="middle">MOBILEMULLIGANS.NET</textPath>
  </text>
  <circle cx="26" cy="96" r="1.3" fill="#A78B63"/>
  <circle cx="94" cy="96" r="1.3" fill="#A78B63"/>

  <!-- Wordmark -->
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="60" y="145" font-size="16.5" font-weight="700" letter-spacing="6.5" fill="#1F3A3B">MOBILE</text>
    <text x="60" y="164" font-size="16.5" font-weight="700" letter-spacing="2.4" fill="#A78B63">MULLIGANS</text>
    <line x1="8" y1="177.5" x2="22" y2="177.5" stroke="#A78B63" stroke-width="0.8"/>
    <line x1="98" y1="177.5" x2="112" y2="177.5" stroke="#A78B63" stroke-width="0.8"/>
    <text x="60" y="180" font-size="5" font-weight="500" letter-spacing="1" fill="#1F3A3B" opacity="0.85">MOBILE GOLF SIMULATOR</text>
  </g>
</svg>
